<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CourtSide — Live Tennis Court Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --court:#1F6E63;
    --court-dark:#15504A;
    --school:#2F6FD8;
    --private:#D98C2B;
    --indoor:#7A4FB5;
    --closed:#8A9089;
    --chalk:#F6F3EA;
    --ink:#1B2421;
    --ink-soft:#5B6660;
    --line:#E2DDD0;
    --available:#2E8B57;
    --inuse:#C0552F;
    --queue:#B8860B;
    --card-shadow: 0 12px 32px -8px rgba(27,36,33,0.25), 0 2px 8px rgba(27,36,33,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--chalk);font-family:'Inter',sans-serif;color:var(--ink);}
  #app{position:relative;width:100%;height:100vh;overflow:hidden;}
  #map{position:absolute;inset:0;}
  .leaflet-container{background:#E9E4D6;font-family:'Inter',sans-serif;}

  /* ---------- Top bar ---------- */
  #topbar{
    position:absolute;top:16px;left:16px;right:16px;z-index:1000;
    display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;
    pointer-events:none;
  }
  @media (max-width: 600px){
    #topbar{ top:32px; left:8px; }
  }
  .glass{
    background:rgba(246,243,234,0.92);
    backdrop-filter:blur(8px);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--card-shadow);
    pointer-events:auto;
  }
  #brand{display:flex;align-items:center;gap:10px;padding:12px 16px;flex:0 0 auto;}
  #brand .mark{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(160deg,var(--court),var(--court-dark));
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;color:var(--chalk);font-weight:700;font-size:15px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,0.18);
  }
  #brand .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.01em;}
  #brand .tag{font-size:11px;color:var(--ink-soft);margin-top:-2px;font-family:'JetBrains Mono',monospace;}

  #sport-bar{display:flex;gap:8px;padding:10px 14px;align-items:center;flex:0 0 auto;}
  .sport-btn{border:1px solid var(--line);background:#fff;color:var(--ink-soft);padding:8px 13px;border-radius:11px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:600;font-family:'Inter',sans-serif;opacity:.55;transition:opacity .15s, background .15s, color .15s;white-space:nowrap;}
  .sport-btn.active{background:var(--court);border-color:var(--court);color:#fff;opacity:1;}
  #sport-pickleball-btn.active{background:#4FA3C7;border-color:#4FA3C7;}
  .sport-btn .sport-count{font-family:'JetBrains Mono',monospace;font-size:11px;}

  #legend{display:flex;gap:12px;padding:12px 14px;align-items:center;flex:0 0 auto;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);font-weight:500;white-space:nowrap;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex:none;}

  /* ---------- Radius control ---------- */
  #radius-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;flex:0 0 auto;}
  #sort-bar .r-label{font-size:11px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
  #radius-bar input[type="range"]{
    width:110px;height:4px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(to right, var(--court) 0%, var(--court) var(--fill,30%), var(--line) var(--fill,30%), var(--line) 100%);
    border-radius:4px;outline:none;cursor:pointer;
  }
  #radius-bar input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:#fff;border:3px solid var(--court);cursor:pointer;
    box-shadow:0 2px 6px rgba(27,36,33,0.3);
  }
  #radius-bar input[type="range"]::-moz-range-thumb{
    width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--court);cursor:pointer;
  }
  /* ---------- Floating map controls (locate + search-this-area) ---------- */
  /* Pull Leaflet's default zoom control up closer to our floating
     locate/search-this-area buttons, instead of sitting alone in the
     far corner with a big empty gap between them. */
  .leaflet-control-zoom{ margin-bottom:50px !important; }

  #map-controls{
    position:absolute;right:16px;bottom:150px;z-index:1000;
    display:flex;flex-direction:column;align-items:flex-end;gap:10px;
    pointer-events:none;
  }
  #map-controls > *{ pointer-events:auto; }
  #locate-btn{
    border:none;background:#fff;color:var(--ink-soft);
    width:44px;height:44px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:18px;
    flex:none;transition:background .15s;box-shadow:var(--card-shadow);
  }
  #locate-btn:hover{background:#EFEBDE;}
  #locate-btn.active{background:var(--court);color:#fff;}
  #search-area-btn{
    flex:none;width:auto;padding:10px 16px;font-size:13px;border-radius:20px;
    white-space:nowrap;box-shadow:var(--card-shadow);
  }

  #sort-bar{padding:11px 16px;}

  /* ---------- Admin bar ---------- */
  #admin-bar{display:flex;gap:8px;padding:10px 14px;align-items:center;flex:0 0 auto;}
  #admin-btn{border:none;background:var(--line);color:var(--ink-soft);padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:none;}
  #admin-btn.active{background:var(--indoor);color:#fff;}
  #add-location-btn{border:none;background:var(--court);color:#fff;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:none;white-space:nowrap;}

  /* ---------- You-are-here marker ---------- */
  .you-marker{position:relative;width:18px;height:18px;}
  .you-marker .core{
    position:absolute;inset:3px;border-radius:50%;background:#2B7FE0;border:2px solid #fff;
    box-shadow:0 0 0 2px rgba(43,127,224,0.25);
  }
  .you-marker .pulse{
    position:absolute;inset:-8px;border-radius:50%;background:rgba(43,127,224,0.25);
    animation:you-pulse 2.2s ease-out infinite;
  }
  @keyframes you-pulse{0%{transform:scale(0.4);opacity:.9;}100%{transform:scale(1.6);opacity:0;}}

  /* ---------- Map pins ---------- */
  .court-pin{cursor:pointer;transition:transform .15s ease;transform-origin:50% 100%;}
  .court-pin-selected-ring{position:relative;width:50px;height:62px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
  .court-pin-selected-ring::before{
    content:'';position:absolute;left:50%;bottom:6px;width:48px;height:48px;
    transform:translateX(-50%);border-radius:14px;
    border:3px solid #2B7FE0;box-shadow:0 0 0 4px rgba(43,127,224,0.18);
    animation:selected-ring-pulse 1.6s ease-out infinite;
  }
  @keyframes selected-ring-pulse{
    0%{box-shadow:0 0 0 4px rgba(43,127,224,0.18);}
    70%{box-shadow:0 0 0 9px rgba(43,127,224,0);}
    100%{box-shadow:0 0 0 4px rgba(43,127,224,0);}
  }
  .court-pin-selected-ring .court-pin{transform:scale(1.04);}
  .court-pin:hover{transform:scale(1.08);}
  .leaflet-popup, .leaflet-popup-tip{display:none !important;}

  /* ---------- Detail panel ---------- */
  #panel{
    position:absolute;top:96px;right:16px;bottom:16px;width:360px;
    z-index:1000;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;
    transform:translateX(400px);opacity:0;
    transition:transform .32s cubic-bezier(.2,.8,.2,1), opacity .25s ease;
  }
  #panel.open{transform:translateX(0);opacity:1;}
  #panel-scroll{overflow-y:auto;flex:1;}
  #panel-head{padding:18px 20px 12px;border-bottom:1px solid var(--line);position:relative;}
  #panel-head .type-pill{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    padding:3px 9px;border-radius:20px;margin-bottom:8px;
  }
  .type-pill.public{background:rgba(31,110,99,0.12);color:var(--court-dark);}
  .type-pill.school{background:rgba(47,111,216,0.12);color:var(--school);}
  .type-pill.private{background:rgba(217,140,43,0.16);color:#9c6018;}
  .type-pill.indoor{background:rgba(122,79,181,0.14);color:var(--indoor);}
  #panel-head h2{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:0 0 6px;letter-spacing:-0.01em;display:inline;}
  #panel-head .addr{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  #panel-close{
    position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;
    border:none;background:var(--line);color:var(--ink-soft);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:5;
  }
  #panel-close:hover{background:#d8d2c0;}
  .edit-pencil{border:none;background:none;color:var(--court-dark);font-size:11.5px;font-weight:600;cursor:pointer;margin-left:6px;}

  .rating-row{display:flex;align-items:center;gap:6px;margin:2px 0 4px;}
  .stars{position:relative;display:inline-block;font-size:14px;letter-spacing:1px;line-height:1;}
  .stars-bg{color:#DCD6C8;}
  .stars-fg{position:absolute;top:0;left:0;overflow:hidden;white-space:nowrap;color:#E0A526;}
  .rating-num{font-weight:700;font-size:12.5px;}
  .rating-count{font-size:11.5px;color:var(--ink-soft);}
  .dist-tag{font-size:11px;color:var(--court-dark);font-weight:600;margin-top:2px;}

  .amenities-row{display:flex;flex-wrap:wrap;gap:8px;padding:11px 20px;border-bottom:1px solid var(--line);}
  .amenity{font-size:11.5px;color:var(--ink-soft);background:#EFEBDE;padding:4px 9px;border-radius:8px;}
  .amenity.none{background:none;color:var(--ink-soft);font-style:italic;padding:0;}

  .busy-section{padding:12px 20px;border-bottom:1px solid var(--line);}
  .busy-section svg{display:block;}
  .busy-section rect{cursor:default;}
  .busy-caption{font-size:11.5px;color:var(--ink-soft);margin-top:2px;line-height:1.45;}
  .busy-caption b{color:var(--ink);}
  .day-tabs{display:flex;gap:4px;margin:8px 0 10px;flex-wrap:wrap;}
  .day-tab{border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-size:10.5px;font-weight:600;padding:5px 8px;border-radius:7px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .day-tab:hover{background:#EFEBDE;}
  .day-tab.active{background:var(--court);border-color:var(--court);color:#fff;}

  .closed-banner{padding:9px 20px;font-size:11.5px;color:#9c6018;background:rgba(217,140,43,0.12);border-bottom:1px solid var(--line);}

  #panel-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 20px;border-bottom:1px solid var(--line);}
  .court-count{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;}
  .hours-row{font-size:11.5px;color:var(--ink-soft);}

  .court-row{padding:14px 20px;border-bottom:1px solid var(--line);}
  .court-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .court-row-top .ct-name{font-weight:600;font-size:14px;}
  .status-pill{display:inline-flex;align-items:center;gap:7px;font-size:14.5px;font-weight:700;padding:6px 14px;border-radius:20px;}
  .status-pill .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .status-pill.available{background:rgba(46,139,87,0.13);color:var(--available);}
  .status-pill.available .dot{background:var(--available);}
  .status-pill.inuse{background:rgba(192,85,47,0.13);color:var(--inuse);}
  .status-pill .status-clock-icon{flex:none;display:block;animation:pulse-icon 1.8s infinite;}
  @keyframes pulse-icon{0%{opacity:1;}50%{opacity:.55;}100%{opacity:1;}}
  .status-pill.closed{background:rgba(138,144,137,0.16);color:var(--closed);}
  .status-pill.closed .dot{background:var(--closed);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,85,47,.45);}70%{box-shadow:0 0 0 7px rgba(192,85,47,0);}100%{box-shadow:0 0 0 0 rgba(192,85,47,0);}}
  .ct-sub{font-size:11.5px;color:var(--ink-soft);margin-bottom:10px;}
  .players-line{font-size:12px;color:var(--ink-soft);margin-bottom:9px;}

  .queue-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .avatar-stack{display:flex;}
  .avatar{
    width:22px;height:22px;border-radius:50%;background:var(--court);color:#fff;
    font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--chalk);margin-left:-6px;font-family:'JetBrains Mono',monospace;
  }
  .avatar:first-child{margin-left:0;}
  .queue-text{font-size:11.5px;color:var(--queue);font-weight:600;}

  .ct-actions{display:flex;gap:8px;}
  .queue-section{padding:12px 20px;border-bottom:1px solid var(--line);}
  .btn{flex:1;border:none;border-radius:9px;padding:8px 0;font-size:12.5px;font-weight:600;cursor:pointer;transition:filter .15s;font-family:'Inter',sans-serif;}
  .btn:hover{filter:brightness(0.94);}
  .btn.primary{background:var(--court);color:#fff;}
  .btn.ghost{background:#EFEBDE;color:var(--ink);}
  .btn.warn{background:var(--queue);color:#fff;}
  .btn[disabled]{opacity:.5;cursor:default;}

  .start-form{padding-top:2px;}
  .sf-label{font-size:11px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 6px;}
  .sf-optional{text-transform:none;font-weight:400;letter-spacing:0;}
  .dur-group{display:flex;gap:6px;margin-bottom:2px;}
  .dur-btn{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 0;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
  .dur-btn.active{background:var(--court);border-color:var(--court);color:#fff;}
  .partner-row{display:flex;gap:6px;margin-bottom:6px;}
  .partner-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px;font-family:'Inter',sans-serif;outline:none;}
  .partner-row input:focus{border-color:var(--court);}
  .x-btn{border:none;background:var(--line);width:28px;border-radius:8px;cursor:pointer;color:var(--ink-soft);}
  .add-partner{border:none;background:none;color:var(--court-dark);font-size:12px;font-weight:600;cursor:pointer;padding:0 0 10px;text-align:left;display:block;}

  .field{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;margin-bottom:8px;font-family:'Inter',sans-serif;}
  .check-label{display:block;font-size:12.5px;margin-bottom:4px;}

  .admin-row{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
  .qr-btn{border:none;background:#EFEBDE;color:var(--ink-soft);padding:7px 10px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;flex:1;}
  .del-btn{border:none;background:rgba(192,85,47,.12);color:var(--inuse);width:34px;border-radius:8px;cursor:pointer;flex:none;}
  .add-court-row{padding:14px 20px;}

  #hint{position:absolute;left:16px;bottom:16px;z-index:1000;padding:10px 14px;border-radius:12px;font-size:11.5px;color:var(--ink-soft);max-width:310px;}
  #hint b{color:var(--ink);}

  /* ---------- View dropdown menu ---------- */
  .view-dropdown{
    position:absolute;top:calc(100% + 6px);left:0;min-width:200px;
    background:rgba(246,243,234,0.98);backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--card-shadow);
    padding:6px;z-index:1100;display:none;flex-direction:column;
  }
  .view-dropdown.open{display:flex;}
  .vd-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);padding:7px 10px 3px;}
  .vd-item{border:none;background:none;text-align:left;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:8px;}
  .vd-item:hover{background:var(--line);}
  .vd-item.active{background:rgba(31,110,99,0.1);color:var(--court-dark);font-weight:700;}
  .vd-divider{height:1px;background:var(--line);margin:5px 6px;}
  #city-suggestions{display:flex;flex-direction:column;gap:1px;margin-top:6px;max-height:160px;overflow-y:auto;}
  .city-suggestion{border:none;background:none;text-align:left;padding:8px 9px;border-radius:7px;font-size:12.5px;color:var(--ink);cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;width:100%;white-space:nowrap;overflow:hidden;}
  .city-suggestion:hover{background:var(--line);}
  .city-suggestion .cs-pin{flex:none;font-size:11px;}
  .city-suggestion .cs-name{flex:none;font-weight:500;overflow:hidden;text-overflow:ellipsis;}
  .city-suggestion .cs-region{color:var(--ink-soft);font-size:11px;flex:none;margin-left:auto;padding-left:8px;}
  .city-suggestion-empty{font-size:11.5px;color:var(--ink-soft);padding:7px 9px;line-height:1.4;}

  /* Inline sort pills shown inside the top bar in card view */
  .sort-pill{border:1px solid var(--line);background:#fff;color:var(--ink-soft);padding:6px 11px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
  .sort-pill:hover{background:#EFEBDE;}
  .sort-pill.active{background:var(--court);border-color:var(--court);color:#fff;}

  /* ---------- Card view overlay ---------- */
  .card-view-overlay{
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:var(--chalk);z-index:900;
    display:none;overflow-y:auto;
    padding:90px 16px 32px;
  }
  .card-view-overlay.open{display:block;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1100px;margin:0 auto;}

  .loc-card{background:#fff;border:2px solid transparent;border-radius:20px;overflow:hidden;box-shadow:var(--card-shadow);cursor:pointer;transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;}
  .loc-card.selected{border-color:var(--court);box-shadow:0 0 0 3px rgba(31,110,99,0.15), var(--card-shadow);}
  .loc-card:hover{transform:translateY(-2px);box-shadow:0 18px 40px -10px rgba(27,36,33,0.22);}
  .loc-card-head{padding:18px 18px 14px;display:flex;gap:14px;align-items:flex-start;border-bottom:1px solid var(--line);}
  .loc-card-icon{flex:none;}
  .loc-card-meta h3{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin:0 0 3px;letter-spacing:-0.01em;}
  .loc-card-meta .card-addr{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;}
  .card-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .card-pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;}
  .card-pill.public{background:rgba(31,110,99,0.12);color:var(--court-dark);}
  .card-pill.school{background:rgba(47,111,216,0.1);color:var(--school);}
  .card-pill.tennis{background:rgba(127,181,71,0.15);color:#4a7a1f;}
  .card-pill.pickleball{background:rgba(79,163,199,0.15);color:#2a7a9c;}

  .loc-card-quick{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--line);gap:10px;}
  .card-avail{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .card-avail .avail-fraction{color:var(--available);}
  .card-avail .avail-label{font-size:11.5px;font-weight:600;color:var(--ink-soft);}
  .card-waiting-tag{font-size:12px;font-weight:600;color:var(--queue);display:flex;align-items:center;gap:5px;}
  .card-waiting-tag.none{color:var(--ink-soft);font-weight:400;}

  .loc-card-foot{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;}
  .card-dist{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .card-rating{font-size:12px;font-weight:600;}
  .card-hours{font-size:11.5px;color:var(--ink-soft);}
  .card-amenity-icons{display:flex;gap:6px;font-size:14px;}

  /* ---------- QR landing screen (what you see after scanning the door) ---------- */
  .qr-landing{position:fixed;inset:0;background:var(--chalk);z-index:3000;display:none;overflow-y:auto;}
  .qr-landing.open{display:block;}
  .qr-landing-topbar{position:sticky;top:0;z-index:10;background:rgba(246,243,234,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 16px;}

<script>
// ---------------------------------------------------------------
// Mock data — in a real system this comes from GET /v1/locations
// ---------------------------------------------------------------
let LOCATIONS = [];
const API_BASE = 'https://courtside-api-production.up.railway.app';

// A stable per-browser identifier. There's no login system, so this is how
// the backend recognizes "the same player" across different courts and
// locations — it's what makes the one-court-at-a-time and one-queue-at-a-time
// rules enforceable instead of just trusted client state.
function getDeviceId(){
  let id = localStorage.getItem('courtside_device_id');
  if (!id){
    id = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`);
    localStorage.setItem('courtside_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

// ---------------------------------------------------------------
// Live updates — WebSocket connection to the API
// ---------------------------------------------------------------
// Turns "https://..." into "wss://..." (and "http://" into "ws://") so this
// works the same on your local dev server and on the deployed Railway URL.
const WS_URL = API_BASE.replace(/^http/, 'ws');
let socket = null;

function connectSocket(){
  socket = new WebSocket(WS_URL);

  socket.addEventListener('open', () => {
    console.log('🔌 Live updates connected');
  });

  socket.addEventListener('message', (event) => {
    try {
      const { type, payload } = JSON.parse(event.data);
      if (type === 'court_update') handleCourtUpdate(payload);
      else if (type === 'queue_update') handleQueueUpdate(payload);
    } catch(err) {
      console.error('Could not parse live update:', err);
    }
  });

  socket.addEventListener('close', () => {
    console.log('🔌 Live updates disconnected — reconnecting in 3s');
    setTimeout(connectSocket, 3000);
  });

  socket.addEventListener('error', () => {
    socket.close(); // triggers the 'close' handler above, which retries
  });
}

// A court somewhere just changed — either a session started, ended, was
// extended, or expired. This might be a court on a screen we're not even
// looking at right now, so just patch LOCATIONS and let refreshAll()
// figure out what's currently visible.
function handleCourtUpdate(payload){
  const { court } = findCourt(payload.location_id, payload.court_id) || {};
  if (!court) return; // location/court not loaded on this device — ignore

  // If this is our own session, keep our local copy (it already shows
  // "You" correctly) instead of overwriting it with the generic broadcast
  // version, which doesn't know which name in the list is "you".
  const isMine = myActiveSession
    && myActiveSession.locId === payload.location_id
    && myActiveSession.courtId === payload.court_id;
  if (isMine && payload.status === 'in_use') {
    if (payload.session) court.session.endsAt = new Date(payload.session.ends_at).getTime();
    refreshAll();
    return;
  }

  court.status = payload.status === 'in_use' ? 'inuse' : 'available';
  court.session = payload.session ? {
    id: payload.session.id,
    partners: payload.session.players,
    endsAt: new Date(payload.session.ends_at).getTime(),
    durationMin: payload.session.duration_mins,
    expired: false
  } : null;

  refreshAll();
}

// The waiting list at a location changed — replace it wholesale with the
// authoritative list from the server, but keep our own "You" entry as-is
// if we're the one in it.
function handleQueueUpdate(payload){
  const loc = LOCATIONS.find(l=>l.id===payload.location_id);
  if (!loc) return;

  loc.queue = payload.queue.map(entry => {
    if (myActiveQueue && myActiveQueue.queueId === entry.id){
      return { name: 'You', id: entry.id };
    }
    return { name: entry.name, id: entry.id };
  });

  refreshAll();
}

async function loadLocations(){
  try {
    const bounds = map.getBounds();
    const res = await fetch(
      `${API_BASE}/v1/locations?lat=${ORIGIN.lat}&lng=${ORIGIN.lng}` +
      `&north=${bounds.getNorth()}&south=${bounds.getSouth()}` +
      `&east=${bounds.getEast()}&west=${bounds.getWest()}`
    );
    if (!res.ok) throw new Error('API error');
    LOCATIONS = await res.json();
    renderMarkers();
    updateSportCounts();
    updateCurrentCityLabel();
    lastSearchBounds = bounds;
    hideSearchAreaButton();
    await restoreMyActivity(); // ← reattach any session/queue this device already holds
    handleDeepLink(); // ← add this line
  } catch(err) {
    console.error('Could not load locations:', err);
    showToast('Could not load court data — check your connection.');
  }
}

// On page load, ask the server whether this device already has an active
// session or queue spot anywhere, so refreshing the page (or opening a
// different location) can't be used to get around the one-at-a-time rules.
async function restoreMyActivity(){
  try {
    const [sessRes, queueRes] = await Promise.all([
      fetch(`${API_BASE}/v1/sessions/mine?device_id=${encodeURIComponent(DEVICE_ID)}`),
      fetch(`${API_BASE}/v1/queue/mine?device_id=${encodeURIComponent(DEVICE_ID)}`)
    ]);

    if (sessRes.ok){
      const { session } = await sessRes.json();
      if (session){
        myActiveSession = { locId: session.location_id, courtId: session.court_id, sessionId: session.id };
        const { court } = findCourt(session.location_id, session.court_id) || {};
        if (court && (!court.session || court.session.id !== session.id)){
          court.status = 'inuse';
          court.session = {
            id: session.id,
            partners: [session.player_name, ...(session.partners_json || [])],
            endsAt: new Date(session.ends_at).getTime(),
            durationMin: session.duration_mins,
            expired: new Date(session.ends_at).getTime() <= Date.now()
          };
        }
      }
    }

    if (queueRes.ok){
      const { entry } = await queueRes.json();
      if (entry){
        myActiveQueue = { locId: entry.location_id, queueId: entry.id };
        const loc = LOCATIONS.find(l=>l.id===entry.location_id);
        if (loc && !loc.queue.some(q=>q.id===entry.id)){
          loc.queue.push({ name: 'You', id: entry.id });
        }
      }
    }

    refreshAll();
  } catch(err) {
    console.error('restoreMyActivity error:', err);
  }
}

const TYPE_LABELS = {
  public: "Public · open to all",

// Map setup

const map = L.map('map', { zoomControl:false, attributionControl:false })
  .setView([43.8635, -79.425], 13.2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors &copy; CARTO' }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

let ORIGIN = { lat: 43.8635, lng: -79.4250 };
let radiusMiles = 3;
// The exact map area covered by the most recent real search — used to
// decide when you've panned/zoomed somewhere not yet loaded.
let lastSearchBounds = null;



const youIcon = L.divIcon({
  html: `<div class="you-marker"><div class="pulse"></div><div class="core"></div></div>`,
  className:'', iconSize:[18,18], iconAnchor:[9,9]

const youMarker = L.marker([ORIGIN.lat, ORIGIN.lng], { icon: youIcon, zIndexOffset: 1000 }).addTo(map);

function distanceMiles(lat1, lng1, lat2, lng2){
  const R = 3958.8;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function isWithinRadius(loc){ return map.getBounds().contains([loc.lat, loc.lng]); }
function isVisible(loc){ return isWithinRadius(loc) && activeSports[loc.sport]; }

function locStats(loc){
  const total = loc.courts.length;
  const closed = loc.courts.filter(c=>c.status==='closed').length;
  const available = loc.courts.filter(c=>c.status==='available').length;
  const inuse = loc.courts.filter(c=>c.status==='inuse').length;
  const queue = loc.queue.length;
  return {total, available, inuse, closed, queue};
}

}

function makeMarkerIcon(loc, selected){
  const s = locStats(loc);
  const draw = loc.sport === 'pickleball' ? pickleballPinSVG : tennisPinSVG;

function heroCourtSvg(sport, frameColor){

let myActiveQueue = null;
// The one court this device is currently playing on, anywhere in the app —
// { locId, courtId, sessionId } or null. Mirrors myActiveQueue but for
// sessions, and is what lets us block starting a second session anywhere.
let myActiveSession = null;
let isAdmin = false;
let editingLoc = null;
const drafts = {};

// Courts the user has "unlocked" by scanning that court's QR code
// (or simulating the scan). Action buttons stay locked until then.
const verifiedCourts = new Set();
function isVerifiedAtLocation(locId){ return verifiedCourts.has(locId); }
function isVerified(locId, courtId){ return verifiedCourts.has(locId); }

// The focused full-screen page you land on after scanning a court's
// door QR code — { locId, courtId } while open, otherwise null.
let qrLandingCourt = null;

function findCourt(locId, courtId){
  const loc = LOCATIONS.find(l=>l.id===locId);
  const court = loc.courts.find(c=>c.id===courtId);
  return {loc, court};
}

function freeCourt(loc, court){
  // If the court being freed was the one *this device* was playing on,
  // release the one-court-at-a-time lock too.
  if (myActiveSession && court.session && court.session.id === myActiveSession.sessionId){
    myActiveSession = null;
  }
  court.status = 'available';
  court.session = null;
  if (loc.queue.length){
    const next = loc.queue.shift();
    if (next.name === 'You'){
      myActiveQueue = null;
      showToast(`${court.name} at ${loc.name} just opened up — it's your turn!`);
    }
  }
}

// Surface/setting are stored lowercase in the database (e.g. "hard",
// "outdoor") — this just capitalizes them for display, without touching
// the stored values themselves.
function capitalize(str){
  if (!str) return str;
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function fmtClock(ms){
  if (ms < 0) ms = 0;
  const totalSec = Math.floor(ms/1000);
  const m = Math.floor(totalSec/60);
  const s = totalSec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function ensureDraft(locId, courtId){
  const key = `${locId}:${courtId}`;
  if (!drafts[key]) drafts[key] = { open:false, duration:60, yourName:'', partners:[''] };
  return drafts[key];
}
function updateDraftYourName(locId, courtId, value){
  ensureDraft(locId, courtId).yourName = value;
}
function toggleStartForm(locId, courtId){
  const d = ensureDraft(locId, courtId);
  d.open = !d.open;
  renderAllViews();
}
function setDraftDuration(locId, courtId, mins){
  ensureDraft(locId, courtId).duration = mins;
  renderAllViews();
}
function addDraftPartner(locId, courtId){
  const d = ensureDraft(locId, courtId);
  if (d.partners.length < 3) d.partners.push('');
  renderAllViews();
}
function removeDraftPartner(locId, courtId, idx){
  const d = ensureDraft(locId, courtId);
  if (d.partners.length > 1) d.partners.splice(idx, 1);
  renderAllViews();
}
function updateDraftPartner(locId, courtId, idx, value){
  ensureDraft(locId, courtId).partners[idx] = value;
}
async function confirmStart(locId, courtId){
  const key = `${locId}:${courtId}`;
  const d = drafts[key] || { duration:60, yourName:'', partners:[''] };
  const yourName = (d.yourName || '').trim();
  const names = d.partners.map(p=>p.trim()).filter(Boolean);
  if (!yourName){
    showToast("Enter your name before starting.");
    return;
  }

  // A player can only be on one court at a time.
  if (myActiveSession && myActiveSession.courtId !== courtId){
    const { loc: otherLoc, court: otherCourt } = findCourt(myActiveSession.locId, myActiveSession.courtId) || {};
    const where = otherLoc && otherCourt ? ` on ${otherCourt.name} at ${otherLoc.name}` : '';
    showToast(`You're already playing${where}. End that session before starting another.`);
    return;
  }

  // Can't start a session while waiting in a queue somewhere.
  if (myActiveQueue){
    showToast("You're in a queue right now — leave it before starting a session.");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/v1/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        court_id: courtId,
        location_id: locId,
        duration_mins: d.duration,
        player_name: yourName,
        partners: names,
        device_id: DEVICE_ID
      })
    });

    if (!res.ok){
      const err = await res.json();
      showToast(err.message || err.error || 'Could not start session — try again.');
      return;
    }

    const session = await res.json();

    const { court } = findCourt(locId, courtId);
    court.status = 'inuse';
    court.session = {
      id: session.session_id,
      partners: [yourName, ...names],
      endsAt: new Date(session.ends_at).getTime(),
      durationMin: session.duration_mins,
      expired: false
    };
    myActiveSession = { locId, courtId, sessionId: session.session_id };

    delete drafts[key];
    refreshAll();

  } catch(err) {
    console.error('confirmStart error:', err);
    showToast('Could not connect to server — check your connection.');
  }
}

async function addTime(locId, courtId){
  const { court } = findCourt(locId, courtId);
  if (!court.session) return;
  const sessionId = court.session.id;

  try {
    const res = await fetch(`${API_BASE}/v1/sessions/${sessionId}/extend`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });

    if (!res.ok){
      const err = await res.json();
      if (err.error === 'queue_not_empty'){
        showToast('Someone is waiting — you cannot extend while others are in the queue.');
      } else {
        showToast(err.message || 'Could not extend session.');
      }
      return;
    }

    const data = await res.json();
    court.session.endsAt = new Date(data.ends_at).getTime();
    court.session.expired = false;
    refreshAll();

  } catch(err) {
    console.error('addTime error:', err);
    showToast('Could not connect to server.');
  }
}

async function endSession(locId, courtId){
  const { loc, court } = findCourt(locId, courtId);
  const sessionId = court.session?.id;

  if (sessionId){
    try {
      await fetch(`${API_BASE}/v1/sessions/${sessionId}`, {
        method: 'DELETE'
      });
    } catch(err) {
      console.error('endSession error:', err);
    }
  }

  freeCourt(loc, court); // clears myActiveSession if this was mine
  refreshAll();
}

async function joinLocationQueue(locId){
  const loc = LOCATIONS.find(l=>l.id===locId);

  const expiredCourt = loc.courts.find(c=>c.status==='inuse' && c.session && c.session.expired);
  if (expiredCourt){
    expiredCourt.status = 'available';
    expiredCourt.session = null;
    refreshAll();
    return;
  }

  if (myActiveQueue && myActiveQueue.locId !== locId){
    showToast("You're already waiting in another location's queue. Leave it first.");
    return;
  }

  // Can't queue while already playing somewhere.
  if (myActiveSession){
    const { loc: otherLoc, court: otherCourt } = findCourt(myActiveSession.locId, myActiveSession.courtId) || {};
    const where = otherLoc && otherCourt ? ` on ${otherCourt.name} at ${otherLoc.name}` : '';
    showToast(`You're already playing${where} — end that session before joining a queue.`);
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/v1/queue/${locId}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guest_name: 'You', device_id: DEVICE_ID })
    });

    if (!res.ok){
      const err = await res.json();
      showToast(err.message || err.error || 'Could not join queue — try again.');
      return;
    }

    const data = await res.json();

    loc.queue.push({ name: 'You', id: data.queue_id });
    myActiveQueue = { locId, queueId: data.queue_id };
    showToast(data.message);
    refreshAll();

  } catch(err) {
    console.error('joinLocationQueue error:', err);
    showToast('Could not connect to server.');
  }
}

async function leaveLocationQueue(locId){
  if (!myActiveQueue || !myActiveQueue.queueId){
    const loc = LOCATIONS.find(l=>l.id===locId);
    loc.queue = loc.queue.filter(q=>q.name!=='You');
    myActiveQueue = null;
    refreshAll();
    return;
  }

  try {
    await fetch(`${API_BASE}/v1/queue/${locId}/leave`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ queue_id: myActiveQueue.queueId, device_id: DEVICE_ID })
    });

  } catch(err) {
    console.error('leaveLocationQueue error:', err);
  }

  const loc = LOCATIONS.find(l=>l.id===locId);
  loc.queue = loc.queue.filter(q=>q.name!=='You');
  myActiveQueue = null;
  refreshAll();
}

// Hours can come from two shapes: a plain string (only ever produced
// locally, never actually saved), or the real hours_json object shape the
// API returns — e.g. { "Mon": { "open": "07:00", "close": "21:00" }, ... }.
// This renders either one without falling back to "[object Object]".
function formatHours(hours){
  if (!hours) return 'Hours not listed';
  if (typeof hours === 'string') return hours;
  if (hours.note) return hours.note;
  const today = new Date().toLocaleDateString('en-US', { weekday: 'short' });
  const todayHours = hours[today];
  if (todayHours && todayHours.open && todayHours.close){
    return `${to12h(todayHours.open)} – ${to12h(todayHours.close)} today`;
  }
  const any = Object.values(hours)[0];
  if (any && any.open && any.close) return `${to12h(any.open)} – ${to12h(any.close)}`;
  return 'Hours not listed';
}
function to12h(t){
  const [h, m] = t.split(':').map(Number);
  const period = h >= 12 ? 'PM' : 'AM';
  const h12 = ((h + 11) % 12) + 1;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}

async function createLocation(lat, lng){
  const name = document.getElementById('new-name').value.trim();
  if (!name){ showToast('Give the location a name.'); return; }
  const city = document.getElementById('new-city').value.trim();
  if (!city){ showToast('City is required.'); return; }
  const sport = document.getElementById('new-sport').value;
  const type = document.getElementById('new-type').value;
  const address = document.getElementById('new-address').value.trim() || 'No address provided';
  const hoursText = document.getElementById('new-hours').value.trim();
  const courtCount = Math.max(1, Math.min(20, parseInt(document.getElementById('new-courts').value) || 1));
  const lights = document.getElementById('new-lights').checked;
  const parking = document.getElementById('new-parking').checked;
  const restrooms = document.getElementById('new-restrooms').checked;
  const water = document.getElementById('new-water').checked;

  const createBtn = document.querySelector(`[onclick="createLocation(${lat},${lng})"]`);
  if (createBtn){ createBtn.disabled = true; createBtn.textContent = 'Creating…'; }

  try {
    const locRes = await fetch(`${API_BASE}/v1/admin/locations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, sport, type, address, city, lat, lng,
        hours_json: hoursText ? { note: hoursText } : {},
        surface: 'hard', setting: 'outdoor',
        lights, parking, restrooms, water
      })
    });

    if (!locRes.ok){
      const err = await locRes.json();
      showToast(err.error || 'Could not create the location — try again.');
      return;
    }

    const newLoc = await locRes.json();

    const courts = [];
    for (let i = 1; i <= courtCount; i++){
      const courtRes = await fetch(`${API_BASE}/v1/admin/courts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location_id: newLoc.id, label: `Court ${i}` })
      });
      if (courtRes.ok){
        const court = await courtRes.json();
        courts.push({ id: court.id, name: court.label, status: court.status, session: null });
      }
    }

    LOCATIONS.push({
      id: newLoc.id, name: newLoc.name, sport: newLoc.sport, type: newLoc.type,
      address: newLoc.address, city: newLoc.city, hours: newLoc.hours_json,
      lat: newLoc.lat, lng: newLoc.lng, rating: 0, reviews: 0,
      surface: newLoc.surface, setting: newLoc.setting,
      amenities: { lights, parking, restrooms, water },
      courts, queue: []
    });

    if (tempMarker){ map.removeLayer(tempMarker); tempMarker = null; }
    refreshAll();
    openPanel(newLoc.id);
    showToast(`${name} saved — visible to everyone now.`);
    loadKnownCities(); // pick up a brand-new city immediately if this is its first location

  } catch(err) {
    console.error('createLocation error:', err);
    showToast('Could not connect to server — check your connection.');
  } finally {
    if (createBtn){ createBtn.disabled = false; createBtn.textContent = 'Create location'; }
  }
}

// ---------------------------------------------------------------
// Busyness bar chart — pick a day, see every operating hour's
// average % of courts in use that hour. Only renders once a
// location has logged enough sessions to make the pattern meaningful.
// ---------------------------------------------------------------
const USAGE_THRESHOLD = 50;
const selectedBusyDay = {}; // locId -> currently selected day label

function busynessChartHtml(loc){
  const usage = loc.usage || { samples: 0 };
  if (usage.samples < USAGE_THRESHOLD){
    return `<div class="busy-section">
      <div class="sf-label">Busiest times this week</div>
      <div class="busy-caption">Not enough data yet — ${usage.samples} session${usage.samples===1?'':'s'} logged (need ${USAGE_THRESHOLD}+).</div>
    </div>`;
  }

  const days = Object.keys(usage.data);
  const hours = usage.hours;

  if (!selectedBusyDay[loc.id]){
    let best = days[0], bestVal = -1;
    days.forEach(d=>{
      const m = Math.max(...usage.data[d]);
      if (m > bestVal){ bestVal = m; best = d; }
    });
    selectedBusyDay[loc.id] = best;
  }
  const day = selectedBusyDay[loc.id];
  const values = usage.data[day];

  const dayTabs = days.map(d=>{
    const active = d === day ? 'active' : '';
    return `<button class="day-tab ${active}" onclick="selectBusyDay('${loc.id}','${d}')">${d}</button>`;
  }).join('');

  const barW = 16, gap = 4, chartH = 62, baseY = 68;
  let peakVal = -1, peakHour = '';
  values.forEach((v,i)=>{ if (v > peakVal){ peakVal = v; peakHour = hours[i]; } });
  const avg = Math.round(values.reduce((a,b)=>a+b,0) / values.length);

  const bars = values.map((v,i)=>{
    const h = (v/100) * chartH;
    const color = v >= 70 ? '#C0552F' : v >= 40 ? '#B8860B' : '#2E8B57';
    const x = 4 + i*(barW+gap);
    return `<rect x="${x}" y="${baseY-h}" width="${barW}" height="${Math.max(h,1.5)}" rx="3" fill="${color}">
        <title>${day} ${hours[i]}: ${v}% of courts in use that hour</title>
      </rect>`;
  }).join('');
  const labels = values.map((v,i)=>{
    if (i % 2 !== 0) return '';
    const x = 4 + i*(barW+gap) + barW/2;
    return `<text x="${x}" y="${baseY+12}" text-anchor="middle" font-size="8.5" fill="#5B6660" font-family="JetBrains Mono, monospace">${hours[i]}</text>`;
  }).join('');
  const totalW = 4 + values.length*(barW+gap);

  return `<div class="busy-section">
    <div class="sf-label">Busiest times this week <span class="sf-optional">(${usage.samples}+ sessions logged)</span></div>
    <div class="day-tabs">${dayTabs}</div>
    <svg viewBox="0 0 ${totalW} 84" width="100%" height="96">${bars}${labels}</svg>
    <div class="busy-caption"><b>${day}</b> peak: <b>${peakHour}</b> at ${peakVal}% of courts in use · day average ${avg}%. 100% means every court is full that whole hour; 50% means about half are, on average. Hover a bar for its exact hour.</div>
  </div>`;
}

  selectedBusyDay[locId] = day;
  renderPanel();
}

function estimateWait(loc){
  const available = loc.courts.filter(c=>c.status==='available').length;
  if (available > 0) return null;

  const remainingTimes = loc.courts
    .filter(c=>c.status==='inuse' && c.session && !c.session.expired)
    .map(c=>c.session.endsAt - Date.now())
    .filter(ms=>ms>0)
    .sort((a,b)=>a-b);
  if (!remainingTimes.length) return null;

  const aheadInQueue = loc.queue.length;
  if (aheadInQueue >= remainingTimes.length) return '1+ hour wait';

  const mins = Math.ceil(remainingTimes[aheadInQueue] / 60000);
  return mins >= 60 ? '1+ hour wait' : `~${mins} min wait`;
}

async function deleteLocation(locId){
  const loc = LOCATIONS.find(l=>l.id===locId);
  if (!loc) return;
  showConfirmModal(`Delete "${loc.name}"? This removes it from the app for everyone. This cannot be undone.`, async ()=>{
    try {
      const res = await fetch(`${API_BASE}/v1/admin/locations/${locId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Server rejected the request');

      LOCATIONS = LOCATIONS.filter(l=>l.id!==locId);
      editingLoc = null;
      closePanel();
      refreshAll();
      showToast(`${loc.name} removed.`);
      loadKnownCities(); // drop the city from search if that was its last location
    } catch(err) {
      console.error('deleteLocation error:', err);
      showToast('Could not delete the location — check your connection and try again.');
    }
  });
}

function renderPanel(){
  const loc = LOCATIONS.find(l=>l.id===activeLocId);
  if (!loc) return;

  if (isAdmin && editingLoc === loc.id){
    document.getElementById('panel-scroll').innerHTML = editFormHtml(loc);
    return;
  }

  const s = locStats(loc);
  const closedBanner = s.closed > 0
    ? `<div class="closed-banner">⚠ ${s.closed} court${s.closed>1?'s':''} closed for maintenance</div>`
    : '';
  const weatherBanner = (loc.weather && (loc.weather.status === 'wet' || loc.weather.status === 'raining'))
    ? `<div class="closed-banner">🌧 ${loc.weather.message} <span style="opacity:.75;">(estimate)</span></div>`
    : '';
  const forecastBanner = (loc.weather && loc.weather.upcomingRain)
    ? `<div class="closed-banner">☂ ${loc.weather.upcomingRain.message} <span style="opacity:.75;">(forecast)</span></div>`
    : '';

  const html = `
    <div id="panel-head">
      <button id="panel-close" onclick="closePanel()">✕</button>
      <span class="type-pill ${loc.type}">${SPORT_ICONS[loc.sport]} ${TYPE_LABELS[loc.type]}</span>
      <h2>${loc.name}</h2>
      ${isAdmin ? `<button class="edit-pencil" onclick="toggleEditLocation('${loc.id}')">✎ Edit</button>` : ''}
      ${starsHtml(loc.rating, loc.reviews)}
      <div class="addr">${loc.address} · ${capitalize(loc.setting)} · ${capitalize(loc.surface)}</div>
      <div class="dist-tag">${distanceMiles(ORIGIN.lat,ORIGIN.lng,loc.lat,loc.lng).toFixed(1)} mi from you</div>
    </div>
    ${amenitiesHtml(loc)}
    ${closedBanner}
    ${weatherBanner}
    ${forecastBanner}
    <div id="panel-summary">
      <div class="hours-row">🕒 ${formatHours(loc.hours)}</div>
    </div>
    ${queueSectionHtml(loc, false)}
    ${busynessChartHtml(loc)}
    ${loc.courts.map(c=>courtRowHtml(loc,c, false)).join('')}
    ${isAdmin ? `<div class="add-court-row"><button class="add-partner" onclick="addCourtToLocation('${loc.id}')">+ Add court to this location</button></div>` : ''}
  `;
  document.getElementById('panel-scroll').innerHTML = html;
}

function openPanel(locId){
  activeLocId = locId;
  editingLoc = null;
  renderPanel();
  document.getElementById('panel').classList.add('open');
  const loc = LOCATIONS.find(l=>l.id===locId);
  if (loc) map.panTo([loc.lat, loc.lng], { animate:true });
  renderMarkers();
  if (currentView === 'card') renderCardView();
  loadUsageForLocation(locId); // fetch the real busyness chart data for this specific location
  loadWeatherForLocation(locId); // fetch the estimated dry-time reading for this specific location
}

async function loadWeatherForLocation(locId){
  try {
    const res = await fetch(`${API_BASE}/v1/locations/${locId}/weather`);
    if (!res.ok) return;
    const weather = await res.json();
    const loc = LOCATIONS.find(l=>l.id===locId);
    if (loc){
      loc.weather = weather;
      if (activeLocId === locId) renderPanel();
    }
  } catch(err) {
    console.error('loadWeatherForLocation error:', err);
  }
}

async function loadUsageForLocation(locId){
  try {
    const res = await fetch(`${API_BASE}/v1/locations/${locId}/usage`);
    if (!res.ok) return;
    const usage = await res.json();
    const loc = LOCATIONS.find(l=>l.id===locId);
    if (loc){
      loc.usage = usage;
      if (activeLocId === locId) renderPanel();
    }
  } catch(err) {
    console.error('loadUsageForLocation error:', err);
  }
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  activeLocId = null;
  editingLoc = null;
  renderMarkers();
  if (currentView === 'card') renderCardView();
}

// ---------------------------------------------------------------
// QR landing page — the focused, single-court screen you land on
// after scanning the QR code printed on that court's door/gate
// ---------------------------------------------------------------
function showQrLanding(locId){
  verifiedCourts.add(locId);
  qrLandingCourt = { locId };
  renderQrLandingContent();
  document.getElementById('qr-landing').classList.add('open');
}

function closeQrLanding(){
  document.getElementById('qr-landing').classList.remove('open');
  const locId = qrLandingCourt ? qrLandingCourt.locId : null;
  qrLandingCourt = null;
  if (locId) openPanel(locId);
}

function renderQrLandingContent(){
  if (!qrLandingCourt) return;
  const locId = qrLandingCourt.locId;
  const loc = LOCATIONS.find(l=>l.id===locId);
  const el = document.getElementById('qr-landing-content');
  if (!loc){ el.innerHTML = '<p>This location could not be found.</p>'; return; }

  const s = locStats(loc);

  el.innerHTML = `
    <div class="qr-verified-banner">✓ Checked in at ${loc.name} via QR code</div>
    <div class="qr-hero">
      ${heroCourtSvg(loc.sport, TYPE_COLORS[loc.type])}
      <div class="qr-hero-text">
        <span class="type-pill ${loc.type}">${SPORT_ICONS[loc.sport]} ${TYPE_LABELS[loc.type]}</span>
        <h1>${loc.name}</h1>
        <div class="qr-landing-loc">${loc.address}</div>
      </div>
    </div>
    <div class="qr-meta-row">
      ${starsHtml(loc.rating, loc.reviews)}
      <div class="hours-row">🕒 ${formatHours(loc.hours)}</div>
    </div>
    ${amenitiesHtml(loc)}
    <div class="sf-label" style="padding:12px 0 8px;">Select a court</div>
    ${loc.courts.map(c=>courtRowHtml(loc,c,true)).join('')}
    ${queueSectionHtml(loc, true)}
  `;
}

function renderAllViews(){
  if (activeLocId) renderPanel();
  if (qrLandingCourt) renderQrLandingContent();
}
function refreshAll(){
  renderMarkers();
  updateSportCounts();
  renderAllViews();
  if (currentView === 'card') renderCardView();
}

// ---------------------------------------------------------------
// Live countdowns
// ---------------------------------------------------------------
function tick(){
  let changed = false;
  LOCATIONS.forEach(loc=>{
    loc.courts.forEach(court=>{
      if (court.status === 'inuse' && court.session && !court.session.expired){
        const remaining = court.session.endsAt - Date.now();
        if (remaining <= 0){
          court.session.expired = true;
          changed = true;
        } else {
          // Use querySelectorAll, not getElementById — the same timer id
          // can legitimately exist more than once at the same time (main
          // panel, card view, QR landing can all render one for the same
          // court), and getElementById only ever finds the first match,
          // which might not be the one currently visible on screen.
          const els = document.querySelectorAll(`[id="timer-${loc.id}-${court.id}"]`);
          els.forEach(el => el.textContent = fmtClock(remaining));
        }
      }
    });
  });
  if (changed) refreshAll();
}
setInterval(tick, 1000);

function updateRadiusUI(){
  // No-op now that the radius circle is gone — kept as a stub so the
  // existing call sites (search-this-area, locate button) don't need
  // to change.
}

function showSearchAreaButton(){ document.getElementById('search-area-btn').style.display = 'inline-block'; }
function hideSearchAreaButton(){ document.getElementById('search-area-btn').style.display = 'none'; }

function maybeShowSearchAreaButton(){
  if (!lastSearchBounds || !lastSearchBounds.contains(map.getBounds())){
    showSearchAreaButton();
  } else {
    hideSearchAreaButton();
  }
}
map.on('moveend zoomend', ()=>{
  maybeShowSearchAreaButton();
  refreshAll();
});

function searchThisArea(){
  const center = map.getCenter();
  ORIGIN = { lat: center.lat, lng: center.lng };
  if (activeLocId){
    const loc = LOCATIONS.find(l=>l.id===activeLocId);
    if (loc && !isVisible(loc)) closePanel();
  }
  loadLocations();
}

let watchId = null; // non-null once live tracking is actually running

let myRealLocation = null; // your actual GPS position — independent of wherever you've searched

function beginWatchingLocation(onFirstFix, onError){
  const btn = document.getElementById('locate-btn');
  let settled = false;

  watchId = navigator.geolocation.watchPosition(
    (pos)=>{
      myRealLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      youMarker.setLatLng([myRealLocation.lat, myRealLocation.lng]);
      btn.classList.add('active');
      if (!settled){
        settled = true;
        onFirstFix();
      }
    },
    ()=>{
      if (!settled){
        settled = true;
        watchId = null;
        btn.classList.remove('active');
        onError();
      }
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 8000 }
  );
}

function useMyLocation(){
  if (watchId !== null && myRealLocation){
    ORIGIN = { lat: myRealLocation.lat, lng: myRealLocation.lng };
    updateRadiusUI();
    map.once('moveend', loadLocations);
    map.panTo([ORIGIN.lat, ORIGIN.lng]);
    return;
  }
  if (!navigator.geolocation){ showToast('Geolocation is not available in this browser.'); return; }

  beginWatchingLocation(
    ()=>{
      ORIGIN = { lat: myRealLocation.lat, lng: myRealLocation.lng };
      map.once('moveend', loadLocations);
      map.panTo([ORIGIN.lat, ORIGIN.lng]);
    },
    ()=> showToast("Couldn't get your location — check your browser's location permission and try again.")
  );
}

function initializeApp(){
  let usedFallback = false;
  function fallbackToDefault(){
    if (usedFallback) return;
    usedFallback = true;
    loadLocations();
    loadKnownCities();
    connectSocket();
  }

  if (!navigator.geolocation){
    fallbackToDefault();
    return;
  }

  beginWatchingLocation(
    ()=>{
      usedFallback = true;
      ORIGIN = { lat: myRealLocation.lat, lng: myRealLocation.lng };
      map.once('moveend', loadLocations);
      map.setView([ORIGIN.lat, ORIGIN.lng], 13.2);
      loadKnownCities();
      connectSocket();
    },
    fallbackToDefault
  );

  setTimeout(fallbackToDefault, 8000);
}

initializeApp();
if (new URLSearchParams(location.search).get('admin') === '1'){
  document.getElementById('admin-btn').style.display = 'inline-block';
}

// ---------------------------------------------------------------
// View menu dropdown
// ---------------------------------------------------------------
let currentView = 'map';
let currentSort = 'distance';
let viewMenuOpen = false;

function toggleViewMenu(){
  viewMenuOpen = !viewMenuOpen;
  document.getElementById('view-menu-dropdown').classList.toggle('open', viewMenuOpen);
  if (viewMenuOpen){
    const input = document.getElementById('city-search-input');
    if (input){ input.value = ''; filterCitySuggestions(''); }
  }
}
document.addEventListener('click', (e)=>{
  const wrap = document.getElementById('view-menu-wrap');
  if (wrap && !wrap.contains(e.target) && viewMenuOpen){
    viewMenuOpen = false;
    document.getElementById('view-menu-dropdown').classList.remove('open');
  }
});

// ---------------------------------------------------------------
// City search — fetched once from a dedicated endpoint that isn't limited
// by distance, unlike LOCATIONS (which only ever holds whatever's within
// the current radius fetch). Without this, a city like Irvine would drop
// out of search results the moment you're viewing courts somewhere else,
// even though it genuinely has courts saved in the database.
// ---------------------------------------------------------------
let KNOWN_CITIES = [];
async function loadKnownCities(){
  try {
    const res = await fetch(`${API_BASE}/v1/locations/cities`);
    if (res.ok) KNOWN_CITIES = await res.json();
    updateCurrentCityLabel();
  } catch(err) {
    console.error('loadKnownCities error:', err);
  }
}
function getKnownCities(){
  return KNOWN_CITIES;
}

function nearestKnownCity(){
  const cities = getKnownCities();
  if (!cities.length) return null;
  let best = cities[0], bestDist = Infinity;
  cities.forEach(c=>{
    const d = Math.hypot(c.lat - ORIGIN.lat, c.lng - ORIGIN.lng);
    if (d < bestDist){ bestDist = d; best = c; }
  });
  return best;
}

function updateCurrentCityLabel(){
  const city = nearestKnownCity();
  if (!city) return;
  document.getElementById('brand-tag').textContent = city.name;
}

function filterCitySuggestions(query){
  const box = document.getElementById('city-suggestions');
  const q = query.trim().toLowerCase();

  if (!q){
    box.innerHTML = '';
    return;
  }

  const matches = getKnownCities().filter(c => c.name.toLowerCase().includes(q));
  if (!matches.length){
    box.innerHTML = `<div class="city-suggestion-empty">No supported city matches "${query}" yet — only cities with onboarded courts are searchable.</div>`;
    return;
  }
  box.innerHTML = matches.map(c =>
    `<button class="city-suggestion" onclick="selectCity('${c.name.replace(/'/g,"\\'")}')"><span class="cs-pin">📍</span><span class="cs-name">${c.name}</span><span class="cs-region">${c.count} location${c.count>1?'s':''}</span></button>`
  ).join('');
}

function trySelectTypedCity(){
  const val = document.getElementById('city-search-input').value.trim();
  const match = getKnownCities().find(c => c.name.toLowerCase() === val.toLowerCase());
  if (match){ selectCity(match.name); }
  else { showToast(`"${val}" isn't a supported city yet.`); }
}

function selectCity(name){
  const city = getKnownCities().find(c => c.name === name);
  if (!city) return;
  viewMenuOpen = false;
  document.getElementById('view-menu-dropdown').classList.remove('open');
  if (currentView === 'card') switchView('map');
  showToast(`Showing courts in ${city.name}`);

  ORIGIN = { lat: city.lat, lng: city.lng };
  map.once('moveend', loadLocations);
  map.flyTo([city.lat, city.lng], 12, { duration: 0.9 });
}

function switchView(v){
  currentView = v;
  viewMenuOpen = false;
  document.getElementById('view-menu-dropdown').classList.remove('open');
  document.getElementById('vd-map-btn').classList.toggle('active', v==='map');
  document.getElementById('vd-card-btn').classList.toggle('active', v==='card');

  const inCard = v === 'card';

  // Sort pills (inside the dropdown) only make sense in card view;
  // locate/search-this-area only make sense while looking at the map.
  document.getElementById('sort-section').style.display = inCard ? 'block' : 'none';
  document.getElementById('map-controls').style.display = inCard ? 'none' : 'flex';

  if (inCard){
    document.getElementById('card-view').classList.add('open');
    adjustCardViewPadding();
    renderCardView();
  } else {
    document.getElementById('card-view').classList.remove('open');
  }
}

// The toolbar's actual height varies by screen width (it wraps onto more
// rows on narrow phones) — measuring it directly instead of assuming a
// fixed padding is what keeps the sort bar from overlapping the first card.
function adjustCardViewPadding(){
  const topbar = document.getElementById('topbar');
  const cardView = document.getElementById('card-view');
  cardView.style.paddingTop = (topbar.offsetHeight + 32) + 'px';
}
window.addEventListener('resize', ()=>{
  if (currentView === 'card') adjustCardViewPadding();
});

function setSort(s){
  currentSort = s;
  ['distance','available','rating'].forEach(k=>{
    const pill = document.getElementById(`sp-${k}`);
    if (pill) pill.classList.toggle('active', k===s);
  });
  renderCardView();
}

// ---------------------------------------------------------------
// Card view — each visible location gets a full card
// ---------------------------------------------------------------
function renderCardView(){
  const locs = LOCATIONS.filter(isVisible);
  if (currentSort === 'distance'){
    locs.sort((a,b)=>distanceMiles(ORIGIN.lat,ORIGIN.lng,a.lat,a.lng)-distanceMiles(ORIGIN.lat,ORIGIN.lng,b.lat,b.lng));
  } else if (currentSort === 'available'){
    locs.sort((a,b)=>locStats(b).available - locStats(a).available);
  } else if (currentSort === 'rating'){
    locs.sort((a,b)=>(b.rating||0)-(a.rating||0));
  }

  if (!locs.length){
    document.getElementById('card-view-inner').innerHTML = `<div style="text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:14px;">No locations in view. Switch to Map view, zoom out, and tap "Search this area."</div>`;
    return;
  }

  const cards = locs.map(loc=>{
    const s = locStats(loc);
    const dist = distanceMiles(ORIGIN.lat,ORIGIN.lng,loc.lat,loc.lng).toFixed(1);
    const ratingStars = loc.reviews ? `<span style="color:#E0A526">★</span> ${loc.rating.toFixed(1)} <span style="color:var(--ink-soft);font-weight:400;">(${loc.reviews})</span>` : '<span style="color:var(--ink-soft)">No ratings</span>';
    const amenityIcons = [
      loc.amenities.lights ? '☀' : '',
      loc.amenities.parking ? '🅿' : '',
      loc.amenities.restrooms ? '🚻' : '',
      loc.amenities.water ? '💧' : '',
    ].filter(Boolean).join(' ');

    return `<div class="loc-card${loc.id===activeLocId ? ' selected' : ''}" onclick="openPanel('${loc.id}')">
      <div class="loc-card-head">
        <div class="loc-card-icon">${heroCourtSvg(loc.sport, TYPE_COLORS[loc.type])}</div>
        <div class="loc-card-meta">
          <h3>${loc.name}</h3>
          <div class="card-addr">${loc.address}</div>
          <div class="card-pills">
            <span class="card-pill ${loc.type}">${TYPE_LABELS[loc.type]}</span>
            <span class="card-pill ${loc.sport}">${loc.sport === 'tennis' ? 'Tennis' : 'Pickleball'}</span>
          </div>
        </div>
      </div>
      <div class="loc-card-quick">
        <div class="card-avail">
          <span class="avail-fraction">${s.available}/${s.total - s.closed}</span>
          <span class="avail-label">Available</span>
        </div>
        ${s.queue > 0
          ? `<div class="card-waiting-tag">⏳ ${s.queue} waiting</div>`
          : `<div class="card-waiting-tag none">No one waiting</div>`}
      </div>
      <div class="loc-card-foot">
        <div class="card-dist">📍 ${dist} mi</div>
        <div class="card-hours">🕒 ${formatHours(loc.hours)}</div>
        <div class="card-rating">${ratingStars}</div>
      </div>
      <div style="padding:0 18px 14px;display:flex;justify-content:space-between;align-items:center;">
        <div class="card-amenity-icons" title="Amenities">${amenityIcons || '<span style="font-size:11px;color:var(--ink-soft)">No amenities listed</span>'}</div>
        <button class="btn primary" style="flex:none;width:auto;padding:8px 14px;font-size:12.5px;border-radius:9px;" onclick="event.stopPropagation();openPanel('${loc.id}')">View courts →</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('card-view-inner').innerHTML = `<div class="card-grid">${cards}</div>`;
}

// ---------------------------------------------------------------
// QR deep link — opening ?loc=...&court=... is what happens when you
// scan the QR code printed on a court's door/gate. It unlocks that
// specific court and drops you straight onto its focused action page.
//
// This should only ever fire from an actual fresh scan, or because
// you're genuinely still playing/queued somewhere — NOT on every plain
// reload just because the URL still happens to contain ?loc=... from
// an earlier scan. The URL gets cleaned up right after being used once
// so a later reload doesn't replay it.
// ---------------------------------------------------------------
const deepLinkParams = new URLSearchParams(location.search);
const deepLinkLoc = deepLinkParams.get('loc');

let deepLinkHandled = false;

function stripLocFromUrl(){
  const url = new URL(location.href);
  url.searchParams.delete('loc');
  url.searchParams.delete('court');
  history.replaceState(null, '', url.toString());
}

function handleDeepLink(){
  if (deepLinkHandled) return;

  // A fresh scan takes priority — it's the clearest signal of intent.
  if (deepLinkLoc && LOCATIONS.some(l=>l.id===deepLinkLoc)){
    deepLinkHandled = true;
    showQrLanding(deepLinkLoc);
    stripLocFromUrl();
    return;
  }

  // No fresh scan this load — but if you're still actively playing or
  // waiting in a queue somewhere, a reload should still take you back
  // to that court instead of dropping you on the plain map.
  const stillActiveLocId = (myActiveSession && myActiveSession.locId) || (myActiveQueue && myActiveQueue.locId);
  if (stillActiveLocId && LOCATIONS.some(l=>l.id===stillActiveLocId)){
    deepLinkHandled = true;
    showQrLanding(stillActiveLocId);
  }
}
